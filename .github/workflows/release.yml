name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Prepare dist directory
        run: mkdir -p dist

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/aiprobe-${{ github.ref_name }}-linux-amd64 ./cmd/aiprobe

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o dist/aiprobe-${{ github.ref_name }}-linux-arm64 ./cmd/aiprobe

      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o dist/aiprobe-${{ github.ref_name }}-darwin-amd64 ./cmd/aiprobe

      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o dist/aiprobe-${{ github.ref_name }}-darwin-arm64 ./cmd/aiprobe

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o dist/aiprobe-${{ github.ref_name }}-windows-amd64.exe ./cmd/aiprobe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/aiprobe-${{ github.ref_name }}-linux-amd64
            dist/aiprobe-${{ github.ref_name }}-linux-arm64
            dist/aiprobe-${{ github.ref_name }}-darwin-amd64
            dist/aiprobe-${{ github.ref_name }}-darwin-arm64
            dist/aiprobe-${{ github.ref_name }}-windows-amd64.exe
